<mat-card-header>
  <mat-card-title>Frage {{getCurrentQuestionNumber()}}/{{getTotalQuestionNumber()}}</mat-card-title>
</mat-card-header>
<mat-card-content>
  {{getQuestionText()}}
  <mat-grid-list cols="2" rowHeight="2:1">
    <mat-grid-tile *ngFor="let answer of getAnswers()">
      <button mat-raised-button (click)="onClickAnswer(answer, button._getHostElement())" #button>{{answer.text}}</button>

    </mat-grid-tile>
  </mat-grid-list>
</mat-card-content>
