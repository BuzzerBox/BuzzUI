<mat-nav-list>
  @if (isAlreadyLoggedIn()) {
    <a mat-list-item (click)="logOutAnswer()">Anwort ausloggen</a>
  }
  @if (!isAlreadyLoggedIn()) {
    <a mat-list-item (click)="logInAnswer()">Anwort einloggen</a>
  }
  <a mat-list-item (click)="activateAnswer()">Antwort aktivieren</a>
</mat-nav-list>
