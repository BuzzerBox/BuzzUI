<mat-card class="team-card">
  <mat-card-header>
    <mat-card-title>{{getName()}}</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <p>
      Punkte: {{getPoints()}}
    </p>
  </mat-card-content>
  <mat-card-actions *ngIf="isMaster">
    <button mat-button (click)="addPoint()">+1</button>
    <button mat-button (click)="removePoint()" [disabled]="getPoints() == 0">-1</button>
  </mat-card-actions>
</mat-card>
