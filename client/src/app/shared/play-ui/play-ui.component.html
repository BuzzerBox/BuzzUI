<div class="play-container" fxLayout="row" fxLayoutAlign="start stretch">
  <ng-container *ngIf="!isGameOver">
    <div fxFlex="15" class="teams-left-pane">
      <ng-container *ngFor="let team of getTeams(); let even = even">
        <app-team-card [team]="team" *ngIf="even" [isMaster]="isMaster"></app-team-card>
      </ng-container>
    </div>
    <div fxFlex="70" class="questions-pane">
      <div class="parent">
        <mat-card class="question">
          <app-question-pane [question]="currentQuestion" [isMaster]="isMaster"></app-question-pane>
          <mat-card-actions>
            <button mat-button [disabled]="!hasPreviousQuestion()" (click)="getPreviousQuestion()" *ngIf="isMaster" title="Springe zur vorherigen Frage">Vorherige Frage</button>
            <button mat-button [disabled]="!hasNextQuestion()" (click)="getNextQuestion()" *ngIf="isMaster" title="Springe zur nächsten Frage">Nächste Frage</button>
            <span class="spacer"></span>
<!--            TODO: move this button to the right. Also, show dialog to confirm it-->
            <button mat-button (click)="endGameLocally()" *ngIf="isMaster" title="Beende das Spiel und zeige das gewinnende Team an">Spiel Beenden</button>
          </mat-card-actions>

        </mat-card>
      </div>
    </div>
    <div fxFlex="15" class="teams-right-pane">
      <ng-container *ngFor="let team of getTeams(); let odd = odd">
        <app-team-card [team]="team" *ngIf="odd" [isMaster]="isMaster"></app-team-card>
      </ng-container>
    </div>
  </ng-container>
  <ng-container *ngIf="isGameOver">
    <mat-card class="scores">
      <mat-card-header>
        <mat-card-title>Punkteliste</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <div class="score">
          <div *ngFor="let team of getTeamsOrderedByScore(); let i = index;">
            <span class="score-entry placed{{(i + 1) <= 3 ? '-' + (i + 1) : ''}}">{{i + 1}}. {{team.name}}: {{team.points}} Pkt.</span>
          </div>
        </div>
      </mat-card-content>
      <mat-card-actions *ngIf="isMaster">
        <button mat-button (click)="endGameOnServerAndGoToStartScreen()" *ngIf="isMaster" title="Spiel beenden und zum Startbildschirm zurückkehren">Spielsession beenden</button>
      </mat-card-actions>

    </mat-card>
  </ng-container>
</div>
