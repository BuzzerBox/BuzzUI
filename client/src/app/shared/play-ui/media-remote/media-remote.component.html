<div class="example-button-row">
  <div class="example-flex-container">
    <button mat-icon-button aria-label="Play" (click)="play()">
      <mat-icon>play_arrow</mat-icon>
    </button>
    <button mat-icon-button aria-label="Pause" (click)="pause()">
      <mat-icon>pause</mat-icon>
    </button>
    <button mat-icon-button aria-label="Replay" (click)="replay()">
      <mat-icon>replay</mat-icon>
    </button>
  </div>
