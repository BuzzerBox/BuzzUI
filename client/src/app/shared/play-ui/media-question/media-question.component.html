<vg-player (onPlayerReady)="onPlayerReady($event)">
  <vg-controls vgFor="my-video" [vgAutohide]="true" [vgAutohideTime]="0">
  </vg-controls>

  <video #myMedia
         [vgMedia]="myMedia"
         id="my-video"
         preload="auto"
         [src]="media.fileSrc"
         type="video/mp4">
  </video>
</vg-player>
