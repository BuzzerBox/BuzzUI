@if (isVideo()) {
  <vg-player (onPlayerReady)="onPlayerReady($event)" class="player">
    <vg-controls vgFor="my-video" [vgAutohide]="true" [vgAutohideTime]="0">
    </vg-controls>
    <video #myMedia
      [vgMedia]="myMedia"
      id="my-video"
      preload="auto"
      [src]="media.fileSrc">
    </video>
  </vg-player>
}

@if (isImage() && mediaVisible) {
  <div class="player">
    <img [src]="media.fileSrc" alt="The image for this question">
  </div>
}
