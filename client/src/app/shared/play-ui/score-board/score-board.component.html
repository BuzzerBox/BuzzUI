<mat-card class="scores">
  <mat-card-header>
    <mat-card-title>Punkteliste</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <div class="score">
      @for (team of sortedTeams; track team; let i = $index) {
        <div>
          <span class="score-entry placed{{(i + 1) <= 3 ? '-' + (i + 1) : ''}}">{{i + 1}}. {{team.name}}: {{team.points}} Pkt.</span>
        </div>
      }
    </div>
  </mat-card-content>
  @if (isMaster) {
    <mat-card-actions>
      @if (isMaster) {
        <button mat-button (click)="resetServer()" title="Spiel beenden und zum Startbildschirm zurückkehren">Spielsession beenden</button>
      }
    </mat-card-actions>
  }

</mat-card>
