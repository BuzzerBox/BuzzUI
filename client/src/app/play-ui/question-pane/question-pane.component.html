<div class="parent">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Frage {{getCurrentQuestionNumber()}}/{{getTotalQuestionNumber()}}</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      {{getQuestionText()}}
      <mat-grid-list cols="2" rowHeight="2:1">
        <mat-grid-tile *ngFor="let answer of getAnswers()">
          <!--<mat-card-content>
            <mat-card>
              {{answer.text}}
              <mat-card-content>

              </mat-card-content>
            </mat-card>
          </mat-card-content>-->
          <button mat-raised-button>{{answer.text}}</button>

        </mat-grid-tile>
        <!--<mat-grid-tile>2</mat-grid-tile>
        <mat-grid-tile>3</mat-grid-tile>
        <mat-grid-tile>4</mat-grid-tile>-->
      </mat-grid-list>
    </mat-card-content>

  </mat-card>
</div>
